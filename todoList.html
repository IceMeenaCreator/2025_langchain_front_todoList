<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- 사용자 정의 CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm todo-card">
            <div class="card-body p-4">
              <h2 class="text-center mb-4">📌 TodoList</h2>

              <!-- 할 일 입력 -->
              <div class="mb-3">
                <label for="todoText" class="form-label">할 일 내용</label>
                <input
                  type="text"
                  id="todoText"
                  class="form-control"
                  placeholder="예: 강의자료 만들기"
                />
              </div>

              <div class="row">
                <!-- 우선순위 -->
                <div class="col-md-6 mb-3">
                  <label for="priorityRange" class="form-label">
                    우선순위:
                    <span id="priorityValue" class="range-value">3</span>
                  </label>
                  <input
                    type="range"
                    id="priorityRange"
                    class="form-range"
                    min="1"
                    max="5"
                    value="3"
                  />
                  <div class="small text-muted">
                    값이 클수록 먼저 해야 하는 일
                  </div>
                </div>

                <!-- 중요도 -->
                <div class="col-md-6 mb-3">
                  <label for="importanceRange" class="form-label">
                    중요도:
                    <span id="importanceValue" class="range-value">3</span>
                  </label>
                  <input
                    type="range"
                    id="importanceRange"
                    class="form-range"
                    min="1"
                    max="5"
                    value="3"
                  />
                  <div class="small text-muted">값이 클수록 중요한 일</div>
                </div>
              </div>

              <!-- 추가 버튼 -->
              <div class="d-grid mb-4">
                <button id="addTodoBtn" class="btn btn-primary">
                  할 일 추가
                </button>
              </div>

              <!-- 안내 -->
              <div class="alert alert-info">
                <strong>정렬 기준</strong><br />
                1. 우선순위 + 중요도 합계 높은 순<br />
                2. 합계가 같으면 우선순위 높은 순<br />
                3. 모두 같으면 먼저 등록한 순
              </div>

              <!-- 목록 -->
              <ul id="todoList" class="list-group"></ul>

              <!-- 비어 있을 때 -->
              <div id="emptyMessage" class="text-center text-muted mt-4">
                아직 등록된 할 일이 없습니다.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!— 사용자 정의 JS —>
    <script src="app.js"></script>
  </body>
</html>
